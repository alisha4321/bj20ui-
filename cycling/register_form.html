<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Register your interest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: white; }
        .navbar { background: rgba(0,0,0,0.8) !important; border-bottom: 3px solid #2ecc71; }
        .form-card { background: rgba(255,255,255,0.05); border: 2px solid rgba(46,204,113,0.3); border-radius: 15px; padding: 40px; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(46,204,113,0.3); color: white; border-radius: 8px; }
        .form-control:focus { background: rgba(255,255,255,0.15); border-color: #2ecc71; color: white; box-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .form-control::placeholder { color: #7f8c8d; }
        .btn-success { background: #2ecc71; border: none; padding: 12px; font-weight: 700; border-radius: 8px; }
        .btn-success:hover { background: #27ae60; }
        .page-title { color: #2ecc71; font-weight: 900; }
        label { color: #bdc3c7; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container d-flex justify-content-between">
            <a href="index.html" class="navbar-brand fw-bold">🚴 Cit-E Cycling</a>
            <a href="." class="btn btn-outline-success btn-sm">← Back to Home</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="page-title mb-2">Register Your Interest</h1>
                <p style="color: #bdc3c7;" class="mb-4">Sign up for future cycling events</p>
                <form action="register.php" method="POST" class="form-card">
                    <div class="mb-3">
                        <label class="form-label">Firstname</label>
                        <input type="text" name="firstname" class="form-control" placeholder="Enter your firstname" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" name="surname" class="form-control" placeholder="Enter your surname" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" name="terms" value="yes" class="form-check-input" id="terms" required>
                        <label class="form-check-label" style="color: #bdc3c7;" for="terms">Do you accept the terms and conditions?</label>
                    </div>
                    <input type="Submit" class="btn btn-success w-100" value="Register My Interest">
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
