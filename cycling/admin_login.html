<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login to the admin area</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.8) !important;
            border-bottom: 3px solid #2ecc71;
        }
        .form-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(46,204,113,0.3);
            border-radius: 15px;
            padding: 40px;
        }
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            color: white;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #2ecc71;
            color: white;
            box-shadow: 0 0 10px rgba(46,204,113,0.3);
        }
        .form-control::placeholder { color: #7f8c8d; }
        .btn-success {
            background: #2ecc71;
            border: none;
            padding: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 8px;
        }
        .btn-success:hover { background: #27ae60; transform: translateY(-2px); }
        .page-title { color: #2ecc71; font-weight: 900; }
        label { color: #bdc3c7; font-weight: 600; }
        .lock-icon { font-size: 3rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container d-flex justify-content-between">
            <a href="index.html" class="navbar-brand fw-bold">🚴 Cit-E Cycling</a>
            <a href="." class="btn btn-outline-success btn-sm">← Back to Home</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <div class="lock-icon">🔐</div>
                    <h1 class="page-title">Admin Login</h1>
                    <p class="text-muted">Restricted area — authorised staff only</p>
                </div>
                <form action="login.php" method="POST" class="form-card">
                    <div class="mb-3">
                        <p class="fw-bold mb-1">Username</p>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required minlength="1"><br>
                    </div>
                    <div class="mb-4">
                        <p class="fw-bold mb-1">Password</p>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required minlength="1"><br>
                    </div>
                    <input type="Submit" class="btn btn-success w-100" value="Login to Admin Area">
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
